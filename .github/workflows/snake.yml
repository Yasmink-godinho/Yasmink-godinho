name: Generate Snake Animation

on:
  # roda automaticamente a cada 24h
  schedule:
    - cron: "0 */24 * * *" 

  # permite rodar manualmente
  workflow_dispatch:

  # roda sempre que fizer push na branch principal
  push:
    branches:
      - main

jobs:
  generate:
    permissions:
      contents: write
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      # gera a animação da cobrinha baseada nas contribuições
      - name: Generate github-contribution-grid-snake.svg
        uses: Platane/snk/svg-only@v3
        with:
          github_user_name: Yasmink-godinho
          outputs: |
            dist/github-contribution-grid-snake.svg
            dist/github-contribution-grid-snake-dark.svg?palette=github-dark

      # envia o SVG gerado para a branch "output"
      - name: Push snake animation to output branch
        uses: crazy-max/ghaction-github-pages@v3.1.0
        with:
          target_branch: output
          build_dir: dist
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
